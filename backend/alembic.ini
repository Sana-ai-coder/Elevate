[alembic]
# path to migration scripts (relative to this file)
script_location = %(here)s/migrations

# path_separator; Use os.pathsep for cross-platform correctness
path_separator = os

# database URL for Alembic (development default: sqlite DB next to project root)
# Use the same relative path as the running Flask app (sqlite:///elevate_dev.db)
sqlalchemy.url = sqlite:///elevate_dev.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
