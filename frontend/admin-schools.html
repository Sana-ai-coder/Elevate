<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Admin — Schools & Users</title>
  <link rel="stylesheet" href="/assets/css/admin.css" />
</head>
<body>
  <main style="padding:20px;max-width:980px;margin:0 auto">
    <h1>Schools</h1>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
      <input id="schoolName" placeholder="School name" />
      <input id="schoolSlug" placeholder="slug (optional)" />
      <button id="createSchool">Create</button>
      <span id="schoolMsg" style="color:green;margin-left:8px"></span>
    </div>

    <div style="display:flex;gap:24px">
      <section style="flex:1">
        <h2>All schools</h2>
        <div id="schoolsList">Loading…</div>
      </section>

      <section style="flex:1">
        <h2>Users</h2>
        <label>Filter by school id: <input id="filterSchoolId" /></label>
        <button id="refreshUsers">Refresh</button>
        <div id="usersList" style="margin-top:8px">No users loaded</div>
      </section>
    </div>
  </main>

  <script src="/js/admin-schools.js"></script>
</body>
</html>
